<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto;">
  <div style="background: #1e293b; color: white; padding: 24px; text-align: center; border-radius: 8px 8px 0 0;">
    <h1 style="margin: 0; font-size: 20px;">Federación Argentina de Kendo</h1>
  </div>
  <div style="padding: 32px 24px; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 8px 8px;">
    <h2 style="margin-top: 0;">Estado de Inscripción</h2>
    <p>Hola {{nombre}},</p>
    <p>Su inscripción al evento <strong>{{evento}}</strong> ha sido <strong>{{estado}}</strong>.</p>
    {{mensaje_adicional}}
    <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 24px 0;" />
    <p style="color: #94a3b8; font-size: 12px;">Este es un mensaje automático, por favor no responda a este correo.</p>
  </div>
</body>
</html>
