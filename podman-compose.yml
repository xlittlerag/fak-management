services:
  kendo-db:
    image: docker.io/library/postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: kendo_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: kendo_db
    ports:
      - "5432:5432"

  kendo-app:
    image: localhost/kendo-app:latest
    build: 
      context: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://kendo_user:secure_password@localhost:5432/kendo_db?schema=public"
      JWT_SECRET: "cambiar_por_clave_segura"
      PORT: 3000
    depends_on:
      - kendo-db
    command: ["sh", "-c", "npx prisma db push && node dist/main.js"]
